<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAQ Penempatan STIS 2026</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f8f9fa;
      }

      .navbar {
        background-color: #005baa;
      }

      .navbar-brand {
        font-weight: 600;
        color: white !important;
      }

      .faq-header {
        background: linear-gradient(135deg, #005baa, #007bff);
        color: white;
        padding: 80px 20px;
        text-align: center;
      }

      .search-box {
        max-width: 600px;
        margin: -30px auto 40px auto;
      }

      .accordion-button:not(.collapsed) {
        background-color: #e7f1ff;
        color: #005baa;
        font-weight: 600;
      }

      /* =============================== */
      /* 💬 ANSWER BUBBLE STYLE */
      /* =============================== */

      .answer-bubble {
        background-color: #e9f3ff;
        border-left: 5px solid #005baa;
        padding: 20px;
        border-radius: 15px;
        position: relative;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        animation: fadeIn 0.3s ease-in-out;
      }

      .answer-bubble::before {
        content: "";
        position: absolute;
        left: -10px;
        top: 20px;
        width: 0;
        height: 0;
        border-top: 10px solid transparent;
        border-bottom: 10px solid transparent;
        border-right: 10px solid #e9f3ff;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      footer {
        background-color: #005baa;
        color: white;
        padding: 20px;
        text-align: center;
        margin-top: 60px;
      }
    </style>
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="#">
          Penempatan Sumatera Barat
        </a>
      </div>
    </nav>

    <!-- Header -->
    <section class="faq-header">
      <div class="container">
        <h1 class="fw-bold">FAQ Penempatan STIS 2026</h1>
        <p class="mt-3">
          Temukan jawaban atas pertanyaan seputar penempatan lulusan STIS 2026
        </p>
      </div>
    </section>

    <!-- Search -->
    <div class="container search-box">
      <input
        type="text"
        id="searchInput"
        class="form-control form-control-lg shadow-sm"
        placeholder="Cari pertanyaan..."
      />
    </div>

    <!-- FAQ Section -->
    <div class="container mb-5">
      <div class="accordion" id="faqAccordion"></div>
    </div>

    <footer>© 2026 FAQ Penempatan | Anak Sumatera Barat</footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // DATA FAQ (Simulasi database)
      const faqData = [
        {
          question:
            "Bagaimana pengisian di gform jika berangkat dengan Kendaraan Pribadi?",
          answer: "Isikan 'Kendaraan Pribadi' pada Transportasi Utama.",
        },
        {
          question:
            "Untuk yang belum ga perjadin, otomatis ga dapet form, jadi belum ngisi norek, NPWP, dll?",
          answer:
            "Untuk sekarang tidak, karena data ini berkaitan dengan pengurusan tiket berangkat saja, bukan untuk gaji, pengisian data itu akan difollow up lagi nanti.",
        },
        {
          question: "Kalau pake kendaraan pribadi, berarti ga direimburse ya?",
          answer:
            "Iya sudah pasti ga direimburse, kalau mau reimburse pakai travel saja, tapi di notanya gaboleh tertulis travel, tapi 'Transportasi mana ke mana' contoh 'Transportasi Bukittinggi - Padang'.",
        },
        {
          question:
            "Travel dari bandara ke kabkot satker apa boleh pesan lewat aplikasi?",
          answer:
            "Boleh, diusahakan cari travel yang notanya digital karena lebih aman untuk reimburse.",
        },
        {
          question:
            "Kalau sewa mobil untuk keberangkatan dari rumah ke bandara apakah direimburse?",
          answer:
            "Bisa reimburse, tapi perlu syarat khusus sewa kendaraan, 1. Sim Sopir; 2. STNK Mobil Sewa; 3 Nota tertulis judulnya 'Transportasi A ke B' dengan disertai kop bercp kontak travel.",
        },
        {
          question:
            "Kalau transportasi penghubungnya masih dalam satu kab/kota (bandara-penempatan) atau (orientasi-bandara) walaupun pake taxi/ojol itu ga dapat reimburse?",
          answer:
            "Bisa dapat tapi ga diprioritaskan, karena tahun lalu yang orientasi di bps ibukota provinsi penempatan di bps provinsi masih dapat perjadin karena beda satker. Tapi kalo sekarang engga dapat, jadi amannya jangan terlalu dijanjiin, tapi tetap diurus dan ditanyakan pas pembekalan.",
        },
        {
          question:
            "Kalau ada satker yang pake 2 rekening itu cukup diisi salah satunya atau dua duanya?",
          answer:
            "Rekening yang diisi sekarang ini bebas, ga harus untuk gaji.",
        },
        {
          question:
            "Kalau keberangkatan lebih awal dari waktu perjadin apakah dapat reimburse?",
          answer:
            "Tidak, perjadin yang bisa direimburse sesuai dengan tanggal di surat.",
        },
        {
          question:
            "Kalau bandara keberangkatannya bebas pilih? Contoh ada bandara yang lebih deket dari satker orientasi (bandara YIA—jogja), tapi di sana gada pesawat yang direct, jadi pengennya ke bandara surabaya aja biar pesawatnya gausah transit.",
          answer: "Boleh",
        },
        {
          question:
            "Pengisian tanggal keberangkatan apa dibebaskan selama masih rentang perjadin?",
          answer:
            "Kalo liat tahun lalu yg semua harus serentak per 9 desember. Berarti tahun ini harus mulai tanggal 1 april sih. Misal nanti ada kasus khusus nih, tgl 1 april rill beneran gaada tiket, baru buat surat keterangan untuk berangkat sehari lebih awal atau sehari lebih lambat. Jadi butuh alasan khusus.",
        },
        {
          question:
            "Form perjadin apa masih bisa diedit? soalnya ada yang agen travelnya belum tau.",
          answer:
            "Diisi dengan atau saja, misal Travel A atau Travel B atau Travel C.",
        },
        {
          question:
            "Kalau transport penghubungnya ada 2 misal dari bandara utama naik pesawat kecil ke bandara kedua, setelah itu travel/bis ditulisnya gimana ya?",
          answer:
            "Pesawat itu diisi jadi transport utama, karena berarti bandara tujuannya perlu transit.",
        },
        {
          question:
            "Kalau misal berangkat tanggal 1 dari provinsi asal ke jakarta terus baru berangkat naik pesawat dari jakarta ke provinsi satker di tanggal 2 itu bisa?",
          answer:
            "Bisa, yang penting berangkat dari satker orientasi itu tanggal 1 april",
        },
        {
          question:
            "Kalau kapal gimana misal perlu naik 2 kapal? pelabuhan berangkat sama tujuannya ditulis gimana?",
          answer:
            "Pelabuhan Berangkat Rute 1 mana ke mana: Pelabuhan  Asal; Rute 2 mana ke mana: Pelabuhan  Asal; nanti lakukan yang sama untuk pelabuhan tujuan",
        },
        {
          question:
            "Kalau naik gojek/ojol ke satker itu berarti transportasi utamanya transumkan?",
          answer: "Iyaa.",
        },
        {
          question: "Terkait Pemesanan Tiket",
          answer:
            "Jangan dipesan dulu, baru diisi rencananya saja, nanti tunggu acc dari SDM.",
        },
        {
          question:
            "Pas awal nyampe itu belum dapat kosan, apa mesen hotel 1-2 malam dapet reimburse?",
          answer:
            "Selama 1-2 hari itu kalian belum visum sih dapat. Jadi nginap yang direimburse adalah menginap yang masih dalam proses perjalanan",
        },
        {
          question:
            "kalau di transportasi penghubung yang beraneka macam gimana ya? jadi naik pesawat ke bandara di ibukota provinsi terus naik ojol ke pelabuhan, terus kapal ke kabkot, lanjut ojol, nah kapal ke kabkot itu dihitung penghubung atau apa ya? kalau iya berarti di pilih others ditulis 2 moda ini?",
          answer:
            "Iya begitu saja masuk ke penghubung, diterangin apa apa saja yang dinaiki. Itu nanti pasti disuruh beli sendiri hann, terus nanti untuk yang kapal notanya misal kertas biasa itu perlu surat keterangan",
        },
        {
          question:
            "Tempat lahir di form sesuai KTP atau Kabupaten/Kota kayak sebelum sebelumnya?",
          answer: "Sesuai KTP karena beli tiket perlu tanda pengenal.",
        },
        {
          question:
            "Ada yang penempatan bawa motor, jadi dia berangkat sekalian sama motornya (di bis yang sama) apa bisa reimburse?",
          answer: "Bisa, selama ga melebihi SBM.",
        },
        {
          question:
            "Kalau ada yang penempatan di pulau terpencil disarankan kepala BPS agar pesan 2-3 minggu sebelum karena transportnya jarang, disaranin berangkat 29 maret karena 1-3 april udah full book, itu gimana?",
          answer: "Gapapa, nanti tinggal buat surat keterangan.",
        },
        {
          question:
            "Kalau ada yang transportasi penghubungnya belum jelas bisanya kapan gimana ya? Dan kemungkinan pemberangkatan cuma 1x dalam seminggu",
          answer:
            "Nantri transport utamanya yang menyesuaikan, bisa lebih lambat dari 1 april untuk mengejar kapalnya itu.",
        },
        {
          question:
            "Misal terkait pengisian agen travel masih ragu mau make travel atau sewa mobil bisa ga isiannya 'Travel A atau Sewa Mobil'?",
          answer: "Boleh",
        },
        {
          question:
            "Nanti yang kebagian beli sendiri (reimburse), apakah bisa ganti moda transportasi utama setelah submit form?",
          answer: "Bisa.",
        },
        {
          question:
            "Surat keterangan yang ada alasan khusus pemberangkatan dapat darimana?",
          answer: "Nanti akan disediakan templatenya.",
        },
        {
          question:
            "Kita perlu absen di satker orientasi dulu ga sebelum berangkat?",
          answer:
            "Iyaa akan ada visum untuk bukti tgl 1 berangkat. Jadi tanggal 1 itu harus ke satker orientasi minta visum sama open camera kalo kalian sudah pamitan dari bps orientasi",
        },
        {
          question:
            "Kalau ada yang ga memungkinkan untuk visum, misal karena terlalu jauh bps orientasi dan jadwal flight pagi gimana? Apa tetap diharuskan open camera di bps orientasi?",
          answer:
            "Diakali saja timestamp di tanggal 31, visumnya ditulis 1 april, jelaskan kondisi ke bps orientasi.",
        },
      ];

      const faqAccordion = document.getElementById("faqAccordion");
      const searchInput = document.getElementById("searchInput");

      function renderFAQ(data) {
        faqAccordion.innerHTML = "";

        if (data.length === 0) {
          faqAccordion.innerHTML =
            "<p class='text-center text-muted'>Pertanyaan tidak ditemukan.</p>";
          return;
        }

        data.forEach((item, index) => {
          faqAccordion.innerHTML += `
            <div class="accordion-item mb-3 shadow-sm rounded">
              <h2 class="accordion-header">
                <button class="accordion-button collapsed" type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#collapse${index}">
                  ${item.question}
                </button>
              </h2>
              <div id="collapse${index}" class="accordion-collapse collapse"
                data-bs-parent="#faqAccordion">
                <div class="accordion-body">
                    <div class="answer-bubble">
                    ${item.answer}
                    </div>
                </div>
              </div>
            </div>
          `;
        });
      }

      // Simulasi AJAX Search
      function searchFAQ(keyword) {
        return new Promise((resolve) => {
          setTimeout(() => {
            const filtered = faqData.filter((item) =>
              item.question.toLowerCase().includes(keyword.toLowerCase()),
            );
            resolve(filtered);
          }, 300); // simulasi delay server
        });
      }

      searchInput.addEventListener("keyup", async function () {
        const keyword = this.value;
        const result = await searchFAQ(keyword);
        renderFAQ(result);
      });

      // Initial render
      renderFAQ(faqData);
    </script>
  </body>
</html>
